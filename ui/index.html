<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }

    header {
      background: #1e293b;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #334155;
    }
    header h1 { font-size: 1.2rem; color: #38bdf8; }
    #stats { font-size: 0.8rem; color: #94a3b8; }

    .main { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar upload */
    .sidebar {
      width: 280px;
      background: #1e293b;
      border-right: 1px solid #334155;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }
    .sidebar h2 { font-size: 0.9rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    .upload-area {
      border: 2px dashed #334155;
      border-radius: 8px;
      padding: 24px 12px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .upload-area:hover { border-color: #38bdf8; }
    .upload-area input { display: none; }
    .upload-area p { font-size: 0.85rem; color: #64748b; margin-top: 8px; }
    .upload-area .icon { font-size: 2rem; }
    #upload-status { font-size: 0.82rem; color: #4ade80; min-height: 20px; }
    .file-list { flex: 1; overflow-y: auto; font-size: 0.82rem; color: #94a3b8; }
    .file-item { padding: 6px 0; border-bottom: 1px solid #1e293b; word-break: break-all; }

    /* Chat area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message { max-width: 80%; display: flex; flex-direction: column; gap: 4px; }
    .message.user { align-self: flex-end; }
    .message.bot  { align-self: flex-start; }
    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }
    .user .bubble  { background: #0ea5e9; color: #fff; border-bottom-right-radius: 4px; }
    .bot  .bubble  { background: #1e293b; border: 1px solid #334155; border-bottom-left-radius: 4px; }
    .sources { font-size: 0.75rem; color: #64748b; padding: 0 4px; }
    .sources span { color: #38bdf8; }

    .typing { display: flex; gap: 4px; padding: 12px 16px; background: #1e293b; border-radius: 12px; width: fit-content; }
    .dot { width: 8px; height: 8px; background: #38bdf8; border-radius: 50%; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }

    .input-row {
      padding: 16px 24px;
      background: #1e293b;
      border-top: 1px solid #334155;
      display: flex;
      gap: 12px;
    }
    #question {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 16px;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      resize: none;
      font-family: inherit;
    }
    #question:focus { border-color: #38bdf8; }
    #send-btn {
      background: #0ea5e9;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }
    #send-btn:hover { background: #0284c7; }
    #send-btn:disabled { background: #334155; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>RAG Chat</h1>
    <div id="stats">Đang tải...</div>
  </header>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <h2>Tài liệu</h2>
      <label class="upload-area">
        <div class="icon">📄</div>
        <strong>Chọn file để upload</strong>
        <p>PDF, DOCX, TXT, MD</p>
        <input type="file" id="file-input" accept=".pdf,.docx,.doc,.txt,.md" multiple />
      </label>
      <div id="upload-status"></div>
      <div class="file-list" id="file-list"></div>
    </div>

    <!-- Chat -->
    <div class="chat-area">
      <div id="messages">
        <div class="message bot">
          <div class="bubble">Xin chào! Hãy upload tài liệu và đặt câu hỏi cho tôi.</div>
        </div>
      </div>
      <div class="input-row">
        <textarea id="question" rows="2" placeholder="Nhập câu hỏi..."></textarea>
        <button id="send-btn">Gửi</button>
      </div>
    </div>
  </div>

  <script>
    const API = '';

    async function loadStats() {
      try {
        const res = await fetch(`${API}/stats`);
        const data = await res.json();
        document.getElementById('stats').textContent = `${data.total_chunks} chunks trong DB`;
      } catch { document.getElementById('stats').textContent = 'Không kết nối được server'; }
    }

    // Upload
    document.getElementById('file-input').addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      const status = document.getElementById('upload-status');
      const fileList = document.getElementById('file-list');

      for (const file of files) {
        status.textContent = `Đang upload: ${file.name}...`;
        const form = new FormData();
        form.append('file', file);
        try {
          const res = await fetch(`${API}/upload`, { method: 'POST', body: form });
          const data = await res.json();
          status.textContent = data.message || data.detail;
          const item = document.createElement('div');
          item.className = 'file-item';
          item.textContent = '✓ ' + file.name;
          fileList.prepend(item);
        } catch (err) {
          status.textContent = `Lỗi: ${err.message}`;
        }
      }
      loadStats();
      e.target.value = '';
    });

    // Chat
    function addMessage(role, text, sources) {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = `<div class="bubble">${text}</div>`;
      if (sources && sources.length) {
        const s = document.createElement('div');
        s.className = 'sources';
        s.innerHTML = `Nguồn: ${sources.map(x => `<span>${x}</span>`).join(', ')}`;
        div.appendChild(s);
      }
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function showTyping() {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.id = 'typing';
      div.className = 'message bot';
      div.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function removeTyping() {
      document.getElementById('typing')?.remove();
    }

    async function sendQuestion() {
      const input = document.getElementById('question');
      const btn = document.getElementById('send-btn');
      const q = input.value.trim();
      if (!q) return;

      addMessage('user', q);
      input.value = '';
      btn.disabled = true;
      showTyping();

      try {
        const res = await fetch(`${API}/ask`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q }),
        });
        const data = await res.json();
        removeTyping();
        addMessage('bot', data.answer || data.detail, data.sources);
      } catch (err) {
        removeTyping();
        addMessage('bot', `Lỗi kết nối: ${err.message}`);
      }
      btn.disabled = false;
    }

    document.getElementById('send-btn').addEventListener('click', sendQuestion);
    document.getElementById('question').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
    });

    loadStats();
  </script>
</body>
</html>
